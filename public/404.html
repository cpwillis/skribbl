<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Skribbl Solver</title>
    <meta name="robots" content="noindex" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='10' cy='10' r='7' fill='none' stroke='%234361ee' stroke-width='2.5'/%3E%3Cline x1='15.5' y1='15.5' x2='21' y2='21' stroke='%234361ee' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="site-header" role="banner">
      <div class="header-inner">
        <a href="/" class="site-title" aria-label="Skribbl Solver home">
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="10" cy="10" r="7" />
            <line x1="15.5" y1="15.5" x2="21" y2="21" />
          </svg>
          <span class="title-label">Skribbl Solver</span>
        </a>
        <div class="header-actions">
          <button
            id="dark-mode-toggle"
            class="btn-icon"
            title="Toggle dark mode"
            aria-label="Toggle dark mode"
          >
            🌙
          </button>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="error-page">
        <div class="error-code" aria-hidden="true">404</div>
        <h1 class="error-title">Page not found</h1>
        <p class="error-desc">
          Looks like this word wasn't in the list. The page you're looking for
          doesn't exist.
        </p>
        <a href="/" class="btn-primary btn-back"> ← Back to Skribbl Solver </a>
      </div>
    </main>

    <footer class="site-footer" role="contentinfo">
      <p>
        <a href="/privacy.html">Privacy &amp; Storage Policy</a> ·
        <a
          href="https://github.com/cpwillis/skribbl"
          target="_blank"
          rel="noopener noreferrer"
          >GitHub</a
        >
        · Not affiliated with
        <a href="https://skribbl.io" target="_blank" rel="noopener noreferrer"
          >skribbl.io</a
        >
      </p>
    </footer>

    <script src="/js/darkmode.js"></script>
  </body>
</html>
